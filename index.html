<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Check 2026 | Live Feedback</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background: #f0f2f5;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 420px;
        }
        .button-group {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        .btn-Dogs { background: #4ade80; }
        .btn-Cats { background: #fbbf24; }
        .btn-Ferrets { background: #f87171; }
        #status {
            font-size: 0.9rem;
            color: #555;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Vote for the Best Pet</h1>

        <div class="button-group">
            <button class="btn-Dogs" onclick="castVote('Dogs')">🐶 Dogs</button>
            <button class="btn-Cats" onclick="castVote('Cats')">🐱 Cats</button>
            <button class="btn-Ferrets" onclick="castVote('Ferrets')">🦦 Ferrets</button>
        </div>

        <canvas id="voteChart"></canvas>
        <div id="status">Connecting to database...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ixntbcyeyloralahdtxr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4bnRiY3lleWxvcmFsYWhkdHhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzMxODIsImV4cCI6MjA5MDIwOTE4Mn0.VoVheJlFazR9_cddeuY19LyfmilisvbuhV9xyKn_yf8';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let myChart;
        const voteCounts = { Dogs: 0, Cats: 0, Ferrets: 0 };

        function setStatus(message) {
            document.getElementById('status').innerText = message;
        }

        function initChart() {
            const ctx = document.getElementById('voteChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Dogs', 'Cats', 'Ferrets'],
                    datasets: [{
                        label: 'Votes',
                        data: [0, 0, 0],
                        backgroundColor: ['#4ade80', '#fbbf24', '#f87171']
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true,
                            precision: 0
                        }
                    }
                }
            });
        }

        function updateChart() {
            myChart.data.datasets[0].data = [
                voteCounts.Dogs,
                voteCounts.Cats,
                voteCounts.Ferrets
            ];
            myChart.update();
        }

    async function castVote(choice) {
        setStatus('Submitting vote...');

        const { error } = await supabaseClient
            .from('votes')
            .insert([{ option_name: choice }]);

        if (error) {
            console.error('Insert error:', error);
            setStatus('Vote failed: ' + error.message);
            return;
    }

    // Update the chart immediately, even if Realtime is not working
        if (voteCounts[choice] !== undefined) {
            voteCounts[choice]++;
            updateChart();
    }

    setStatus('Vote counted!');
}

        async function loadInitialVotes() {
            const { data, error } = await supabaseClient
                .from('votes')
                .select('option_name');

            if (error) {
                console.error('Select error:', error);
                setStatus('Could not load votes: ' + error.message);
                return false;
            }

            for (const row of data) {
                if (voteCounts[row.option_name] !== undefined) {
                    voteCounts[row.option_name]++;
                }
            }

            updateChart();
            return true;
        }

        function subscribeToLiveVotes() {
            supabaseClient
                .channel('live-votes')
                .on(
                    'postgres_changes',
                    { event: 'INSERT', schema: 'public', table: 'votes' },
                    payload => {
                        const pet = payload.new.option_name;
                        if (voteCounts[pet] !== undefined) {
                            voteCounts[pet]++;
                            updateChart();
                        }
                    }
                )
                .subscribe((status) => {
                    console.log('Realtime status:', status);
                });
        }

        async function setup() {
            initChart();
            const ok = await loadInitialVotes();
            if (!ok) return;

            subscribeToLiveVotes();
            setStatus('Live and connected!');
        }

        setup();
    </script>
</body>
</html>
